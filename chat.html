<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat — Misto.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="chat-page">
        <div class="chat-header">
            <div class="back-btn" onclick="window.location.href='inbox.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </div>
            <h2 id="chatActiveUser">Chat</h2>
        </div>

        <div class="vanishing-banner">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
            Messages vanish after they've been seen
        </div>

        <div id="messagesList" class="messages-container">
            <p style="text-align:center; padding: 30px; color: #666; font-size: 14px;">Loading messages...</p>
        </div>

        <div class="chat-input-bar">
            <input type="text" id="chatInput" class="chat-input" placeholder="Message..." autocomplete="off">
            <button class="chat-send-btn" id="sendBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="margin-left: -2px;">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="usernames.js"></script>
    <script src="app.js"></script>

    <script>
        // DOM Listeners for chat input that uses the global app.js functions
        document.addEventListener("DOMContentLoaded", () => {
            const sendBtn = document.getElementById("sendBtn");
            const chatInput = document.getElementById("chatInput");

            if (sendBtn && chatInput) {
                sendBtn.addEventListener("click", () => {
                    if (typeof sendChat === 'function') sendChat();
                });

                chatInput.addEventListener("keydown", (e) => {
                    if (e.key === "Enter" && typeof sendChat === 'function') {
                        sendChat();
                    }
                });
            }
        });
    </script>
</body>

</html>
