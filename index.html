<!DOCTYPE html>
<html>

<head>
    <title>Vanta</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Vanta</h1>
    <button onclick="logout()">Logout</button>
    <div class="post-box">

        <h3>Post Story</h3>

        <textarea id="storyText" placeholder="Say something"></textarea>
        <input type="file" id="storyImage">
        <button onclick="postStory()">Post Story</button>

    </div>

    <hr>

    <h2>Status</h2>

    <div id="stories" class="status-list"></div>

    <div id="genderModal" class="gender-modal hidden">
        <div class="gender-box">
            <h3>Select Gender</h3>
            <button onclick="setGender('male')">Male</button>
            <button onclick="setGender('female')">Female</button>
        </div>
    </div>

    <div id="viewer" class="story-viewer hidden">
        <div class="viewer-content">
            <div id="storyProgress" class="story-progress"></div>
            <h3 id="viewerUser"></h3>
            <p id="viewerText"></p>
            <button onclick="closeViewer()">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="usernames.js"></script>
    <script src="app.js"></script>

</body>

</html>
