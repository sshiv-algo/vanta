<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Misto Random Chat - Connected</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="random.css">
</head>

<body>


    <div class="app random-layout">
        <!-- MAIN MISTO HEADER -->
        <div class="topbar random-topbar">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>
            <div class="logo" onclick="window.location.href='app.html'" style="cursor:pointer;">Misto</div>
            <div class="chat-icon" onclick="window.location.href='inbox.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                    </path>
                </svg>
                <div id="unreadDot" class="unread-dot hidden"></div>
            </div>
        </div>

        <!-- SIDE PANEL -->
        <div id="sideMenu" class="side-menu">

            <!-- PROFILE SECTION -->
            <div class="panel-profile">
                <div class="panel-avatar" id="menuAvatar">?</div>
                <div class="panel-username" id="menuUsername">username</div>
            </div>

            <!-- SETTINGS LIST -->
            <div class="panel-settings">

                <!-- Notifications -->
                <div class="panel-row" id="notificationsRow">
                    <div class="panel-row-left">
                        <svg class="panel-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span>Notifications</span>
                        <div class="test-sound-btn" onclick="playTestSound()" title="Test Sound">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        </div>
                    </div>
                    <label class="panel-toggle">
                        <input type="checkbox" id="notificationsToggle">
                        <span class="toggle-track"><span class="toggle-knob"></span></span>
                    </label>
                </div>

                <!-- Dark Mode -->
                <div class="panel-row" id="darkModeRow">
                    <div class="panel-row-left">
                        <svg class="panel-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        <span>Dark Mode</span>
                    </div>
                    <label class="panel-toggle">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="toggle-track"><span class="toggle-knob"></span></span>
                    </label>
                </div>

                <!-- Share -->
                <div class="panel-row panel-row-link" id="shareBtn">
                    <div class="panel-row-left">
                        <svg class="panel-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                        <span>Share</span>
                    </div>
                    <svg class="panel-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>

                <!-- Discord -->
                <div class="panel-row panel-row-link" id="discordBtn">
                    <div class="panel-row-left">
                        <svg class="panel-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.369a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.086-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.332-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.086-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.332-.946 2.418-2.157 2.418z"/></svg>
                        <span>Discord</span>
                    </div>
                    <svg class="panel-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>

                <!-- Privacy Policy -->
                <div class="panel-row panel-row-link" id="privacyBtn">
                    <div class="panel-row-left">
                        <svg class="panel-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <span>Privacy Policy</span>
                    </div>
                    <svg class="panel-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>

                <!-- Divider -->
                <div class="panel-divider"></div>

                <!-- Terms -->
                <div class="panel-row panel-row-link" id="termsBtn">
                    <div class="panel-row-left">
                        <svg class="panel-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        <span>Terms</span>
                    </div>
                    <svg class="panel-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>

            </div>

            <!-- LOGOUT -->
            <button class="panel-logout" onclick="logout()">Logout</button>

        </div>

        <!-- OVERLAY -->
        <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

        <div class="chat-container">

            <!-- HEADER -->
            <div class="chat-header">
                <div class="user-info">
                    <div class="avatar" id="partnerAvatar">?</div>
                    <div>
                        <div style="font-size:14px; font-weight:700;" id="partnerName">Stranger</div>
                        <div style="font-size:11px; color:#666;">Chatting anonymously</div>
                    </div>
                </div>
                <div class="exit-btn" onclick="exitChat()">✕</div>
            </div>

            <!-- MESSAGES -->
            <div class="message-list" id="messageList">
                <!-- Messages will be loaded here -->
                <div style="text-align:center; color:#444; font-size:12px; margin-top:20px;">
                    You are now connected with a stranger.<br>Say hello!
                </div>
            </div>

            <!-- BOTTOM BAR -->
            <div class="chat-bottom-bar">
                <!-- STATUS MESSAGE -->
                <div id="chatStatus" class="chat-status"></div>

                <!-- INPUT -->
                <div class="input-area">
                    <button id="skipBtn" class="skip-btn" onclick="handleSkipClick()">Skip</button>
                    <input type="text" id="chatInput" class="chat-input" placeholder="Type a message..."
                        autocomplete="off">
                    <button class="send-btn" onclick="sendMessage()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- VANTA UNIFIED POPUP SYSTEM -->
    <div id="vantaPopup" class="vanta-popup">
        <div class="vanta-popup-overlay" onclick="closePopup()"></div>
        <div class="vanta-popup-card">
            <div id="popupIcon" class="vanta-popup-icon"></div>
            <h3 id="popupTitle" class="vanta-popup-title"></h3>
            <p id="popupMessage" class="vanta-popup-message"></p>
            <div id="popupActions" class="vanta-popup-actions"></div>
        </div>
    </div>

    <!-- VANTA TOAST SYSTEM -->
    <div id="vantaToast" class="vanta-toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="popups.js"></script>
    <script src="randomChat.js"></script>
</body>

</html>
