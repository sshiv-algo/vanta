<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Misto.</title>
    <meta name="description" content="Misto — Share your stories anonymously">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="random.css">
</head>

<body>

    <!-- APP WRAPPER -->
    <div class="app">

        <!-- TOP BAR -->
        <div class="topbar">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>
            <div class="logo">Misto</div>
            <div class="chat-icon" onclick="window.location.href='inbox.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                    </path>
                </svg>
                <div id="unreadDot" class="unread-dot hidden"></div>
            </div>
        </div>

        <!-- SIDE MENU -->
        <div id="sideMenu" class="side-menu">

            <h3 class="menu-title">Menu</h3>

            <!-- USER CARD -->
            <div class="menu-user">
                <div class="menu-avatar" id="menuAvatar">A</div>
                <div class="menu-username" id="menuUsername">username</div>
            </div>

            <!-- LOGOUT -->
            <button class="logout-btn" onclick="logout()">Logout</button>

        </div>

        <!-- OVERLAY -->
        <div id="overlay" class="overlay" onclick="toggleMenu()"></div>


        <!-- MAIN CONTENT -->
        <div class="container">

            <!-- YOUR STORY -->
            <div class="status-item your-story" onclick="openUpload()">
                <div class="status-circle">+</div>
                <div class="status-text">
                    <b>Your Story</b>
                    <p>Tap to add</p>
                </div>
            </div>

            <!-- HIDDEN UPLOAD BOX -->
            <div id="uploadBox" class="post-box hidden">

                <textarea id="storyText" placeholder="Say something"></textarea>

                <input type="file" id="storyImage">

                <button onclick="postStory()">Post Story</button>

            </div>

            <!-- STORIES -->
            <h3>Status</h3>
            <div id="stories" class="status-list"></div>

        </div>
        <div id="viewerList" class="viewer-sheet">

            <div class="viewer-sheet-overlay" onclick="closeViewerList()"></div>

            <div class="viewer-sheet-content">

                <div class="viewer-sheet-header">
                    <span>Viewers</span>
                    <span onclick="closeViewerList()">✕</span>
                </div>

                <div id="viewerListContent"></div>

            </div>
        </div>

        <!-- STORY VIEWER -->
        <div id="viewer" class="story-viewer hidden">
            <div class="tap-zone left" onclick="prevStory()"></div>
            <div class="tap-zone right" onclick="nextStory()"></div>
            <div class="viewer-content">

                <div id="storyProgress"></div>

                <!-- CLOSE BUTTON -->
                <div class="close-btn" onclick="closeViewer()">✕</div>

                <div id="viewerUser" class="story-header"></div>

                <div id="viewerText" class="story-body"></div>

            </div>

            <!-- REPLY BOX -->
            <div id="replyBox" class="story-reply-box hidden">
                <input type="text" id="replyInput" class="reply-input" placeholder="Reply to story..."
                    onclick="event.stopPropagation()" onmousedown="event.stopPropagation()"
                    onmouseup="event.stopPropagation()" ontouchstart="event.stopPropagation()"
                    ontouchend="event.stopPropagation()" onkeydown="if(event.key==='Enter') sendReply()"
                    onfocus="pauseStory()" onblur="resumeStory()">
                <button class="reply-btn" onclick="event.stopPropagation(); sendReply()"
                    onmousedown="event.stopPropagation()" onmouseup="event.stopPropagation()"
                    ontouchstart="event.stopPropagation()" ontouchend="event.stopPropagation()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>

        </div>

        <div id="toastContainer" class="toast-container"></div>


        <!-- GENDER MODAL -->
        <div id="genderModal" class="gender-modal hidden">

            <div class="gender-box">

                <h3>Select Gender</h3>

                <button onclick="setGender('male')">Male</button>
                <button onclick="setGender('female')">Female</button>

            </div>

        </div>

        <!-- RANDOM CHAT FLOATING BUTTON -->
        <div class="random-fab" onclick="window.location.href='random.html'" title="Random Chat">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 3h5v5"></path>
            <path d="M4 20L21 3"></path>
            <path d="M21 16v5h-5"></path>
            <path d="M15 15l6 6"></path>
            <path d="M4 4l5 5"></path>
        </svg>
    </div>
    </div>


    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="usernames.js"></script>
    <script src="app.js"></script>

</body>

</html>
